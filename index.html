<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kitchen Bakers</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        background:#f4efe6;
        font-family:Arial,sans-serif;
    }

    canvas{
        display:block;
    }

    .ui{
        position:absolute;
        top:20px;
        left:20px;
        background:rgba(255,255,255,0.85);
        padding:14px 18px;
        border-radius:14px;
        box-shadow:0 8px 25px rgba(0,0,0,0.12);
        z-index:10;
    }

    .ui h1{
        font-size:20px;
        margin-bottom:6px;
    }

    .ui p{
        color:#555;
    }
</style>
</head>
<body>

<div class="ui">
    <h1>Kitchen Bakers</h1>
    <p>Click on either baker to make them jump</p>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;

function resize(){
    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();

class Baker{

    constructor(x,color,shirt){

        this.x = x;
        this.y = h * 0.72;

        this.bodyColor = color;
        this.shirtColor = shirt;

        this.jump = 0;
        this.velocity = 0;
    }

    triggerJump(){

        if(this.jump === 0){
            this.velocity = -18;
        }
    }

    update(){

        this.velocity += 0.9;
        this.jump += this.velocity;

        if(this.jump > 0){
            this.jump = 0;
            this.velocity = 0;
        }
    }

    draw(){

        const y = this.y + this.jump;

        ctx.save();
        ctx.translate(this.x, y);

        // shadow
        ctx.beginPath();
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.ellipse(0, 110, 55, 14, 0, 0, Math.PI*2);
        ctx.fill();

        // legs
        ctx.strokeStyle = "#2f2f2f";
        ctx.lineWidth = 14;
        ctx.lineCap = "round";

        ctx.beginPath();
        ctx.moveTo(-18, 70);
        ctx.lineTo(-20, 115);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(18, 70);
        ctx.lineTo(20, 115);
        ctx.stroke();

        // body
        ctx.beginPath();
        ctx.fillStyle = this.shirtColor;
        ctx.ellipse(0, 20, 58, 75, 0, 0, Math.PI*2);
        ctx.fill();

        // apron
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(-22, -5, 44, 70);

        // arms
        ctx.strokeStyle = this.bodyColor;
        ctx.lineWidth = 16;

        ctx.beginPath();
        ctx.moveTo(-45, 5);
        ctx.lineTo(-75, 45);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(45, 5);
        ctx.lineTo(75, 45);
        ctx.stroke();

        // head
        ctx.beginPath();
        ctx.fillStyle = this.bodyColor;
        ctx.arc(0, -80, 42, 0, Math.PI*2);
        ctx.fill();

        // chef hat
        ctx.fillStyle = "#fff";

        ctx.beginPath();
        ctx.arc(-20, -120, 22, 0, Math.PI*2);
        ctx.arc(0, -132, 26, 0, Math.PI*2);
        ctx.arc(22, -120, 22, 0, Math.PI*2);
        ctx.fill();

        ctx.fillRect(-32,-120,64,24);

        // eyes
        ctx.fillStyle = "#222";

        ctx.beginPath();
        ctx.arc(-12,-85,4,0,Math.PI*2);
        ctx.arc(12,-85,4,0,Math.PI*2);
        ctx.fill();

        // smile
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 3;

        ctx.beginPath();
        ctx.arc(0,-68,12,0,Math.PI);
        ctx.stroke();

        // bowl
        ctx.fillStyle = "#c17d3f";

        ctx.beginPath();
        ctx.ellipse(0, 48, 26, 14, 0, 0, Math.PI*2);
        ctx.fill();

        // dough
        ctx.fillStyle = "#f5dfb5";

        ctx.beginPath();
        ctx.arc(0,42,12,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
    }

    isClicked(mx,my){

        const y = this.y + this.jump;

        return (
            mx > this.x - 65 &&
            mx < this.x + 65 &&
            my > y - 140 &&
            my < y + 90
        );
    }
}

const bakers = [
    new Baker(w*0.35, "#f0c28b", "#ff884d"),
    new Baker(w*0.65, "#d89b62", "#4da6ff")
];

canvas.addEventListener("click", e => {

    const rect = canvas.getBoundingClientRect();

    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    bakers.forEach(baker => {

        if(baker.isClicked(mx,my)){
            baker.triggerJump();
        }
    });
});

function drawKitchen(){

    // wall
    ctx.fillStyle = "#f5e8d5";
    ctx.fillRect(0,0,w,h);

    // floor
    ctx.fillStyle = "#d7b38a";
    ctx.fillRect(0,h*0.78,w,h*0.22);

    // tiles
    ctx.strokeStyle = "rgba(0,0,0,0.06)";
    ctx.lineWidth = 1;

    for(let x=0;x<w;x+=60){

        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,h*0.78);
        ctx.stroke();
    }

    for(let y=0;y<h*0.78;y+=60){

        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(w,y);
        ctx.stroke();
    }

    // counter
    ctx.fillStyle = "#9f6d43";
    ctx.fillRect(0,h*0.58,w,40);

    // shelves
    ctx.fillStyle = "#8c5a34";

    ctx.fillRect(120,140,220,18);
    ctx.fillRect(w-340,180,220,18);

    // kitchen items
    for(let i=0;i<4;i++){

        ctx.fillStyle = ["#ff6b6b","#ffd166","#4ecdc4","#6c5ce7"][i];

        ctx.fillRect(145+i*48,95,26,45);
    }

    for(let i=0;i<4;i++){

        ctx.fillStyle = ["#ff9f43","#2ed573","#70a1ff","#eccc68"][i];

        ctx.fillRect(w-315+i*48,135,26,45);
    }

    // oven
    ctx.fillStyle = "#444";
    ctx.fillRect(w/2-90,h*0.58,180,130);

    ctx.fillStyle = "#222";
    ctx.fillRect(w/2-60,h*0.62,120,70);

    ctx.fillStyle = "#ffb347";
    ctx.fillRect(w/2-40,h*0.645,80,22);

    // oven knobs
    for(let i=0;i<4;i++){

        ctx.beginPath();
        ctx.fillStyle="#ddd";
        ctx.arc(w/2-45+i*30,h*0.60,6,0,Math.PI*2);
        ctx.fill();
    }
}

function animate(){

    ctx.clearRect(0,0,w,h);

    drawKitchen();

    bakers.forEach(baker=>{
        baker.update();
        baker.draw();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
