<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Driving Simulator</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow: hidden;
        background: #1a1a1a;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    .ui {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        z-index: 10;
        background: rgba(0,0,0,0.4);
        padding: 12px 16px;
        border-radius: 10px;
        backdrop-filter: blur(5px);
    }

    .ui h2 {
        margin-bottom: 8px;
        font-size: 18px;
    }

    .ui p {
        font-size: 14px;
        opacity: 0.8;
    }
</style>
</head>
<body>

<div class="ui">
    <h2>Car Driving Simulator</h2>
    <p>↑ Accelerate</p>
    <p>↓ Brake / Reverse</p>
    <p>← → Steer</p>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let width, height;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const keys = {};

window.addEventListener("keydown", e => {
    keys[e.key] = true;
});

window.addEventListener("keyup", e => {
    keys[e.key] = false;
});

const car = {
    x: width / 2,
    y: height * 0.75,
    width: 40,
    height: 70,
    speed: 0,
    maxSpeed: 8,
    acceleration: 0.15,
    friction: 0.05,
    angle: 0,
    steering: 0.04
};

const road = {
    x: width / 2,
    width: 420,
    lineOffset: 0
};

function updateCar() {

    // acceleration
    if (keys["ArrowUp"]) {
        car.speed += car.acceleration;
    }

    // reverse/brake
    if (keys["ArrowDown"]) {
        car.speed -= car.acceleration;
    }

    // friction
    if (car.speed > 0) {
        car.speed -= car.friction;
    }

    if (car.speed < 0) {
        car.speed += car.friction;
    }

    // clamp tiny speed
    if (Math.abs(car.speed) < 0.05) {
        car.speed = 0;
    }

    // speed limits
    car.speed = Math.min(car.speed, car.maxSpeed);
    car.speed = Math.max(car.speed, -car.maxSpeed / 2);

    // steering
    if (car.speed !== 0) {
        const flip = car.speed > 0 ? 1 : -1;

        if (keys["ArrowLeft"]) {
            car.angle -= car.steering * flip;
        }

        if (keys["ArrowRight"]) {
            car.angle += car.steering * flip;
        }
    }

    // movement
    car.x += Math.sin(car.angle) * car.speed;
    road.lineOffset += car.speed * 6;

    // road boundaries
    const leftBound = road.x - road.width / 2 + 30;
    const rightBound = road.x + road.width / 2 - 30;

    if (car.x < leftBound) car.x = leftBound;
    if (car.x > rightBound) car.x = rightBound;
}

function drawRoad() {

    // grass
    ctx.fillStyle = "#173d1c";
    ctx.fillRect(0, 0, width, height);

    // road
    ctx.fillStyle = "#2d2d2d";
    ctx.fillRect(
        road.x - road.width / 2,
        0,
        road.width,
        height
    );

    // road edges
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 6;

    ctx.beginPath();
    ctx.moveTo(road.x - road.width / 2, 0);
    ctx.lineTo(road.x - road.width / 2, height);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(road.x + road.width / 2, 0);
    ctx.lineTo(road.x + road.width / 2, height);
    ctx.stroke();

    // center lane lines
    ctx.strokeStyle = "#ffd94d";
    ctx.lineWidth = 5;

    for (let y = -40; y < height + 40; y += 80) {

        const lineY = (y + road.lineOffset) % (height + 80);

        ctx.beginPath();
        ctx.moveTo(road.x, lineY);
        ctx.lineTo(road.x, lineY + 40);
        ctx.stroke();
    }
}

function drawCar() {

    ctx.save();

    ctx.translate(car.x, car.y);
    ctx.rotate(car.angle);

    // shadow
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(
        -car.width / 2 + 4,
        -car.height / 2 + 4,
        car.width,
        car.height
    );

    // body
    const gradient = ctx.createLinearGradient(
        0,
        -car.height/2,
        0,
        car.height/2
    );

    gradient.addColorStop(0, "#4fc3ff");
    gradient.addColorStop(1, "#0077ff");

    ctx.fillStyle = gradient;

    ctx.beginPath();
    ctx.roundRect(
        -car.width / 2,
        -car.height / 2,
        car.width,
        car.height,
        10
    );
    ctx.fill();

    // windshield
    ctx.fillStyle = "#c9f0ff";

    ctx.beginPath();
    ctx.roundRect(
        -car.width / 2 + 6,
        -car.height / 2 + 10,
        car.width - 12,
        18,
        5
    );
    ctx.fill();

    // rear window
    ctx.beginPath();
    ctx.roundRect(
        -car.width / 2 + 6,
        car.height / 2 - 28,
        car.width - 12,
        18,
        5
    );
    ctx.fill();

    // headlights
    ctx.fillStyle = "#fff5aa";

    ctx.fillRect(-car.width/2 + 4, -car.height/2 - 2, 8, 4);
    ctx.fillRect(car.width/2 - 12, -car.height/2 - 2, 8, 4);

    // wheels
    ctx.fillStyle = "#111";

    ctx.fillRect(-car.width/2 - 4, -car.height/2 + 10, 6, 14);
    ctx.fillRect(car.width/2 - 2, -car.height/2 + 10, 6, 14);

    ctx.fillRect(-car.width/2 - 4, car.height/2 - 24, 6, 14);
    ctx.fillRect(car.width/2 - 2, car.height/2 - 24, 6, 14);

    ctx.restore();
}

function animate() {

    ctx.clearRect(0, 0, width, height);

    updateCar();

    drawRoad();
    drawCar();

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
