<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beach Dance Animation</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow: hidden;
        background: linear-gradient(to bottom, #6ed0ff 0%, #8ee3ff 45%, #f7d79b 45%, #e7c27a 100%);
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    .ui {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        background: rgba(0,0,0,0.35);
        padding: 12px 18px;
        border-radius: 12px;
        backdrop-filter: blur(6px);
    }

    .ui h1 {
        font-size: 20px;
        margin-bottom: 6px;
    }

    .ui p {
        opacity: 0.85;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="ui">
    <h1>Beach Dance</h1>
    <p>Click on the character to start dancing</p>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const dancer = {
    x: w / 2,
    y: h * 0.68,
    scale: 1,
    dancing: false,
    danceTime: 0
};

canvas.addEventListener("click", e => {

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const dx = mx - dancer.x;
    const dy = my - dancer.y;

    if (Math.abs(dx) < 80 && Math.abs(dy) < 180) {
        dancer.dancing = !dancer.dancing;
    }
});

function drawBackground() {

    // sun
    ctx.beginPath();
    ctx.fillStyle = "#ffd95c";
    ctx.arc(w - 150, 120, 60, 0, Math.PI * 2);
    ctx.fill();

    // ocean
    ctx.fillStyle = "#39b7e8";
    ctx.fillRect(0, h * 0.45, w, h * 0.15);

    // waves
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = 2;

    for (let i = 0; i < 6; i++) {

        ctx.beginPath();

        for (let x = 0; x < w; x += 20) {

            const y =
                h * 0.5 +
                i * 15 +
                Math.sin(x * 0.02 + performance.now() * 0.002) * 5;

            if (x === 0) {
                ctx.moveTo(x, y);
            } else {
                ctx.lineTo(x, y);
            }
        }

        ctx.stroke();
    }
}

function drawPalms() {

    function palm(x) {

        ctx.strokeStyle = "#6d4325";
        ctx.lineWidth = 16;

        ctx.beginPath();
        ctx.moveTo(x, h);
        ctx.quadraticCurveTo(x + 30, h - 220, x, h - 420);
        ctx.stroke();

        ctx.strokeStyle = "#2f9e44";
        ctx.lineWidth = 8;

        for (let i = 0; i < 7; i++) {

            const angle = -1 + i * 0.35;

            ctx.beginPath();
            ctx.moveTo(x, h - 420);

            ctx.lineTo(
                x + Math.cos(angle) * 100,
                h - 420 + Math.sin(angle) * 100
            );

            ctx.stroke();
        }
    }

    palm(120);
    palm(w - 120);
}

function drawDancer(time) {

    const t = dancer.dancing ? time * 0.008 : 0;

    const sway = Math.sin(t * 2) * 15;
    const hip = Math.sin(t * 3) * 12;
    const armSwing = Math.sin(t * 4) * 25;
    const legSwing = Math.sin(t * 4) * 18;

    ctx.save();

    ctx.translate(dancer.x, dancer.y + Math.sin(t * 6) * 5);

    // shadow
    ctx.beginPath();
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.ellipse(0, 120, 55, 16, 0, 0, Math.PI * 2);
    ctx.fill();

    // head
    ctx.beginPath();
    ctx.fillStyle = "#f1c27d";
    ctx.arc(0, -130, 32, 0, Math.PI * 2);
    ctx.fill();

    // hair
    ctx.beginPath();
    ctx.fillStyle = "#2b1b12";
    ctx.arc(0, -138, 35, Math.PI, Math.PI * 2);
    ctx.fill();

    // body
    ctx.save();
    ctx.rotate(sway * 0.01);

    ctx.fillStyle = "#f1c27d";

    ctx.beginPath();
    ctx.roundRect(-24, -95, 48, 95, 20);
    ctx.fill();

    // bikini top
    ctx.fillStyle = "#ff4fa3";

    ctx.beginPath();
    ctx.moveTo(-24, -75);
    ctx.lineTo(0, -55);
    ctx.lineTo(-8, -35);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(24, -75);
    ctx.lineTo(0, -55);
    ctx.lineTo(8, -35);
    ctx.closePath();
    ctx.fill();

    // bikini bottom
    ctx.beginPath();
    ctx.moveTo(-24, -5);
    ctx.lineTo(24, -5);
    ctx.lineTo(16, 28);
    ctx.lineTo(-16, 28);
    ctx.closePath();
    ctx.fill();

    // arms
    ctx.strokeStyle = "#f1c27d";
    ctx.lineWidth = 14;
    ctx.lineCap = "round";

    // left arm
    ctx.beginPath();
    ctx.moveTo(-22, -70);
    ctx.lineTo(-65, -20 + armSwing);
    ctx.stroke();

    // right arm
    ctx.beginPath();
    ctx.moveTo(22, -70);
    ctx.lineTo(65, -20 - armSwing);
    ctx.stroke();

    // legs
    ctx.beginPath();
    ctx.moveTo(-10, 25);
    ctx.lineTo(-18 - legSwing * 0.2, 110);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(10, 25);
    ctx.lineTo(18 + legSwing * 0.2, 110);
    ctx.stroke();

    ctx.restore();

    // sparkle particles when dancing
    if (dancer.dancing) {

        for (let i = 0; i < 10; i++) {

            const angle = (Math.PI * 2 / 10) * i + t;

            const px = Math.cos(angle) * 90;
            const py = Math.sin(angle) * 120;

            ctx.beginPath();
            ctx.fillStyle = `hsla(${time * 0.05 + i * 30},100%,70%,0.8)`;
            ctx.arc(px, py - 40, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    ctx.restore();
}

function animate(time) {

    ctx.clearRect(0, 0, w, h);

    drawBackground();
    drawPalms();
    drawDancer(time);

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
