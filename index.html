<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Drift Car Simulator</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow: hidden;
        background: #111;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    .ui {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        background: rgba(0,0,0,0.45);
        padding: 14px 18px;
        border-radius: 12px;
        backdrop-filter: blur(8px);
        z-index: 10;
    }

    .ui h1 {
        font-size: 20px;
        margin-bottom: 8px;
    }

    .ui p {
        opacity: 0.8;
        margin: 4px 0;
    }

    .speed {
        margin-top: 10px;
        color: #58c7ff;
    }
</style>
</head>
<body>

<div class="ui">
    <h1>Drift Simulator</h1>
    <p>↑ Accelerate</p>
    <p>↓ Brake / Reverse</p>
    <p>← → Drift Steering</p>
    <div class="speed" id="speed">Speed: 0</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const speedEl = document.getElementById("speed");

let width, height;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const keys = {};

window.addEventListener("keydown", e => {
    keys[e.key] = true;
});

window.addEventListener("keyup", e => {
    keys[e.key] = false;
});

const road = {
    x: width / 2,
    width: 500,
    lineOffset: 0
};

const car = {
    x: width / 2,
    y: height * 0.75,
    width: 42,
    height: 78,

    speed: 0,
    maxSpeed: 12,
    acceleration: 0.22,
    friction: 0.06,

    angle: 0,
    velocityAngle: 0,

    driftFactor: 0.94,
    steering: 0.045
};

const particles = [];
const obstacles = [];

function createObstacle(y) {

    const margin = 70;

    const x =
        road.x -
        road.width / 2 +
        margin +
        Math.random() * (road.width - margin * 2);

    obstacles.push({
        x,
        y,
        width: 55,
        height: 55,
        color: Math.random() > 0.5 ? "#ff5f5f" : "#ffaa33"
    });
}

for (let i = 0; i < 10; i++) {
    createObstacle(-i * 300);
}

function spawnSmoke() {

    if (Math.abs(car.speed) > 3 &&
        (keys["ArrowLeft"] || keys["ArrowRight"])) {

        particles.push({
            x: car.x,
            y: car.y + car.height / 3,
            radius: Math.random() * 8 + 4,
            alpha: 0.4,
            vx: (Math.random() - 0.5) * 2,
            vy: Math.random() * 2 + 1
        });
    }
}

function updateCar() {

    if (keys["ArrowUp"]) {
        car.speed += car.acceleration;
    }

    if (keys["ArrowDown"]) {
        car.speed -= car.acceleration;
    }

    if (car.speed > 0) {
        car.speed -= car.friction;
    }

    if (car.speed < 0) {
        car.speed += car.friction;
    }

    if (Math.abs(car.speed) < 0.05) {
        car.speed = 0;
    }

    car.speed = Math.max(
        -car.maxSpeed / 2,
        Math.min(car.speed, car.maxSpeed)
    );

    // steering + drift
    if (car.speed !== 0) {

        const direction = car.speed > 0 ? 1 : -1;

        if (keys["ArrowLeft"]) {
            car.angle -= car.steering * direction;
        }

        if (keys["ArrowRight"]) {
            car.angle += car.steering * direction;
        }
    }

    // smooth drifting
    car.velocityAngle +=
        (car.angle - car.velocityAngle) *
        (1 - car.driftFactor);

    car.x += Math.sin(car.velocityAngle) * car.speed;

    road.lineOffset += car.speed * 8;

    spawnSmoke();

    // road boundaries
    const left =
        road.x - road.width / 2 + 30;

    const right =
        road.x + road.width / 2 - 30;

    if (car.x < left) {
        car.x = left;
        car.speed *= 0.95;
    }

    if (car.x > right) {
        car.x = right;
        car.speed *= 0.95;
    }

    speedEl.innerText =
        "Speed: " + Math.floor(Math.abs(car.speed) * 10);
}

function updateObstacles() {

    obstacles.forEach(obstacle => {
        obstacle.y += car.speed * 8;

        // recycle obstacles
        if (obstacle.y > height + 100) {
            obstacle.y = -300;
            obstacle.x =
                road.x -
                road.width / 2 +
                70 +
                Math.random() *
                (road.width - 140);
        }

        // collision detection
        const dx = Math.abs(car.x - obstacle.x);
        const dy = Math.abs(car.y - obstacle.y);

        if (
            dx < (car.width + obstacle.width) / 2 &&
            dy < (car.height + obstacle.height) / 2
        ) {
            car.speed *= -0.4;

            // collision burst
            for (let i = 0; i < 25; i++) {
                particles.push({
                    x: obstacle.x,
                    y: obstacle.y,
                    radius: Math.random() * 6 + 2,
                    alpha: 1,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8
                });
            }
        }
    });
}

function updateParticles() {

    for (let i = particles.length - 1; i >= 0; i--) {

        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.02;
        p.radius *= 0.985;

        if (p.alpha <= 0) {
            particles.splice(i, 1);
        }
    }
}

function drawRoad() {

    // grass
    ctx.fillStyle = "#17361d";
    ctx.fillRect(0, 0, width, height);

    // road
    ctx.fillStyle = "#2f2f2f";
    ctx.fillRect(
        road.x - road.width / 2,
        0,
        road.width,
        height
    );

    // road glow
    const glow = ctx.createLinearGradient(
        0,0,width,0
    );

    glow.addColorStop(0, "rgba(255,255,255,0)");
    glow.addColorStop(0.5, "rgba(255,255,255,0.03)");
    glow.addColorStop(1, "rgba(255,255,255,0)");

    ctx.fillStyle = glow;
    ctx.fillRect(
        road.x - road.width / 2,
        0,
        road.width,
        height
    );

    // lane lines
    ctx.strokeStyle = "#ffd84d";
    ctx.lineWidth = 5;

    for (let y = -80; y < height + 80; y += 80) {

        const yy =
            (y + road.lineOffset) %
            (height + 80);

        ctx.beginPath();
        ctx.moveTo(road.x, yy);
        ctx.lineTo(road.x, yy + 40);
        ctx.stroke();
    }

    // borders
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 7;

    ctx.beginPath();
    ctx.moveTo(road.x - road.width/2, 0);
    ctx.lineTo(road.x - road.width/2, height);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(road.x + road.width/2, 0);
    ctx.lineTo(road.x + road.width/2, height);
    ctx.stroke();
}

function drawObstacles() {

    obstacles.forEach(o => {

        ctx.save();

        ctx.translate(o.x, o.y);

        // shadow
        ctx.fillStyle = "rgba(0,0,0,0.35)";
        ctx.fillRect(-26 + 4, -26 + 4, 52, 52);

        // obstacle
        ctx.fillStyle = o.color;

        ctx.beginPath();
        ctx.roundRect(-26, -26, 52, 52, 10);
        ctx.fill();

        // warning stripes
        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 3;

        ctx.beginPath();
        ctx.moveTo(-18, -18);
        ctx.lineTo(18, 18);

        ctx.moveTo(18, -18);
        ctx.lineTo(-18, 18);

        ctx.stroke();

        ctx.restore();
    });
}

function drawParticles() {

    particles.forEach(p => {

        ctx.beginPath();

        ctx.fillStyle =
            `rgba(220,220,220,${p.alpha})`;

        ctx.arc(
            p.x,
            p.y,
            p.radius,
            0,
            Math.PI * 2
        );

        ctx.fill();
    });
}

function drawCar() {

    ctx.save();

    ctx.translate(car.x, car.y);

    // body drift tilt
    ctx.rotate(car.velocityAngle);

    // shadow
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(
        -car.width/2 + 5,
        -car.height/2 + 5,
        car.width,
        car.height
    );

    // body gradient
    const gradient =
        ctx.createLinearGradient(
            0,
            -car.height/2,
            0,
            car.height/2
        );

    gradient.addColorStop(0, "#5fd0ff");
    gradient.addColorStop(1, "#0066ff");

    ctx.fillStyle = gradient;

    ctx.beginPath();
    ctx.roundRect(
        -car.width/2,
        -car.height/2,
        car.width,
        car.height,
        12
    );
    ctx.fill();

    // windshield
    ctx.fillStyle = "#d8f5ff";

    ctx.beginPath();
    ctx.roundRect(
        -14,
        -22,
        28,
        18,
        4
    );
    ctx.fill();

    // rear glass
    ctx.beginPath();
    ctx.roundRect(
        -14,
        6,
        28,
        18,
        4
    );
    ctx.fill();

    // neon glow
    ctx.shadowColor = "#3bc7ff";
    ctx.shadowBlur = 25;

    ctx.fillStyle = "rgba(80,180,255,0.35)";
    ctx.fillRect(
        -car.width/2 + 4,
        car.height/2 - 4,
        car.width - 8,
        4
    );

    // wheels
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#111";

    ctx.fillRect(-car.width/2 - 4, -24, 6, 16);
    ctx.fillRect(car.width/2 - 2, -24, 6, 16);

    ctx.fillRect(-car.width/2 - 4, 8, 6, 16);
    ctx.fillRect(car.width/2 - 2, 8, 6, 16);

    ctx.restore();
}

function animate() {

    ctx.clearRect(0, 0, width, height);

    drawRoad();

    updateCar();
    updateObstacles();
    updateParticles();

    drawObstacles();
    drawParticles();
    drawCar();

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
