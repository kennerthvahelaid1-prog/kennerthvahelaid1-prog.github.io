<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exploding Waves</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: #031526;
        width: 100%;
        height: 100%;
        cursor: crosshair;
    }

    canvas {
        display: block;
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h;
let mouse = {
    x: -9999,
    y: -9999,
    radius: 140
};

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.addEventListener("mouseleave", () => {
    mouse.x = -9999;
    mouse.y = -9999;
});

class Wave {
    constructor(index) {
        this.index = index;
        this.baseY = h * 0.2 + index * 45;
        this.amplitude = 25 + index * 2;
        this.frequency = 0.012 + index * 0.001;
        this.speed = 0.02 + index * 0.002;
        this.phase = Math.random() * Math.PI * 2;
    }

    draw(time) {
        ctx.beginPath();

        for (let x = 0; x <= w; x += 8) {

            let y =
                this.baseY +
                Math.sin(x * this.frequency + time * this.speed + this.phase)
                * this.amplitude;

            // Explosion effect near mouse
            const dx = x - mouse.x;
            const dy = y - mouse.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < mouse.radius) {
                const force = (1 - dist / mouse.radius);

                const angle = Math.atan2(dy, dx);

                y += Math.sin(angle) * force * 120;
            }

            if (x === 0) {
                ctx.moveTo(x, y);
            } else {
                ctx.lineTo(x, y);
            }
        }

        const gradient = ctx.createLinearGradient(0, 0, w, h);
        gradient.addColorStop(0, "rgba(0,180,255,0.1)");
        gradient.addColorStop(0.5, "rgba(0,200,255,0.9)");
        gradient.addColorStop(1, "rgba(150,220,255,0.1)");

        ctx.strokeStyle = gradient;
        ctx.lineWidth = 2;
        ctx.shadowColor = "#3fd0ff";
        ctx.shadowBlur = 20;

        ctx.stroke();
    }
}

const waves = [];
for (let i = 0; i < 10; i++) {
    waves.push(new Wave(i));
}

function animate(time) {

    // deep blue fade background
    ctx.fillStyle = "rgba(3, 21, 38, 0.12)";
    ctx.fillRect(0, 0, w, h);

    // subtle glow overlay
    const bgGradient = ctx.createRadialGradient(
        w/2, h/2, 100,
        w/2, h/2, h
    );

    bgGradient.addColorStop(0, "rgba(0,90,160,0.05)");
    bgGradient.addColorStop(1, "rgba(0,0,0,0)");

    ctx.fillStyle = bgGradient;
    ctx.fillRect(0, 0, w, h);

    waves.forEach(wave => wave.draw(time));

    requestAnimationFrame(animate);
}

animate(0);
</script>

</body>
</html>
